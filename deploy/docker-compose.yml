# RSK Docker Compose
# 镜像由 deploy.sh 构建，compose 只负责运行

services:
  api:
    image: rsk-api:latest
    container_name: rsk-api
    restart: unless-stopped
    volumes:
      - /opt/dujiao-next/config.yml:/app/config.yml:ro
      - /opt/dujiao-next/.env:/app/.env:ro
      - /opt/dujiao-next/data/db:/app/db
      - /opt/dujiao-next/data/uploads:/app/uploads
      - /opt/dujiao-next/data/logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    networks:
      - rsk

  user:
    image: rsk-user:latest
    container_name: rsk-user
    restart: unless-stopped
    networks:
      - rsk

  admin:
    image: rsk-admin:latest
    container_name: rsk-admin
    restart: unless-stopped
    networks:
      - rsk

  nginx:
    image: nginx:1.27-alpine
    container_name: rsk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
      - "444:444"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - api
      - user
      - admin
    networks:
      - rsk

networks:
  rsk:
    driver: bridge
