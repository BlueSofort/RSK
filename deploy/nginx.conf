# RSK 统一 Nginx 配置（Docker 用）
# 挂载到 nginx 容器的 /etc/nginx/conf.d/default.conf

# ─── User 前台 ───
server {
    listen 80;
    listen 443 ssl;
    server_name www.rsk.cc.cd;

    ssl_certificate     /etc/letsencrypt/live/www.rsk.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rsk.cc.cd/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Certbot ACME 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 静态资源（长期缓存）
    location ^~ /assets/ {
        proxy_pass http://user:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API 代理
    location /api/v1 {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件代理
    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        proxy_pass http://user:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Admin 后台 ───
server {
    listen 81;
    listen 444 ssl;
    server_name admin.rsk.cc.cd;

    ssl_certificate     /etc/letsencrypt/live/admin.rsk.cc.cd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.rsk.cc.cd/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Certbot ACME 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /assets/ {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
